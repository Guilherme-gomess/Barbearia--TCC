<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- Fundo branco com borda amarela -->
  <rect x="1" y="1" width="30" height="30" rx="6"
        fill="#ffffff"
        stroke="#E8A800"
        stroke-width="2"/>

  <!-- Letra E preta com contorno amarelo -->
  <text x="16" y="24"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="22"
        font-weight="700"
        fill="#0e0e0e"
        stroke="#E8A800"
        stroke-width="0.8"
        paint-order="stroke fill">E</text>

</svg>
